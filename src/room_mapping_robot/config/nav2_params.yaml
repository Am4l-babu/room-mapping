# =============================================================================
# nav2_params.yaml — Nav2 Navigation Stack Parameters
# =============================================================================
#
# This file configures the COMPLETE Nav2 navigation stack for our
# differential drive room-mapping robot.
#
# Nav2 ARCHITECTURE:
#   ┌─────────────┐    ┌─────────────┐    ┌──────────────┐
#   │  BT Navigator│───→│   Planner   │───→│  Controller  │───→ /cmd_vel
#   │  (behavior   │    │  (global    │    │  (local      │
#   │   tree)      │    │   path)     │    │   tracking)  │
#   └─────────────┘    └─────────────┘    └──────────────┘
#         │                                       ↑
#         │            ┌─────────────┐            │
#         └───────────→│  Behaviors  │────────────┘
#                      │  (recovery  │
#                      │   actions)  │
#                      └─────────────┘
#
# COMPONENTS:
#   - bt_navigator        : Orchestrates navigation via behavior trees
#   - controller_server   : DWB local controller (follows planned paths)
#   - planner_server      : NavFn global planner (A*/Dijkstra pathfinding)
#   - behavior_server     : Recovery behaviors (spin, backup, wait)
#   - local_costmap       : Rolling window around robot (obstacle avoidance)
#   - global_costmap      : Full map-based costmap (path planning)
#   - velocity_smoother   : Smooths /cmd_vel for gentle motor control
#   - waypoint_follower   : Follows a list of waypoints sequentially
#
# TUNING FOR OUR ROBOT:
#   - Robot footprint: 0.18m × 0.14m (very small!)
#   - Max speed: 0.15 m/s linear, 0.5 rad/s angular
#   - Wheel radius: 0.03m, separation: 0.16m
#   - Costmap inflation: tight (0.10m) because robot is tiny
#   - Controller frequency: 10 Hz (sufficient for slow robot)
#   - Resolution: 0.025m (fine-grained for small robot)
# =============================================================================

# ===========================================================================
# BT NAVIGATOR — Behavior Tree Navigation Coordinator
# ===========================================================================
# The BT Navigator uses behavior trees to orchestrate goal navigation.
# It calls the planner for a global path, then the controller to follow it.
# If the robot gets stuck, it triggers recovery behaviors.
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

    # Behavior tree XML — uses the default Nav2 BT for navigate_to_pose
    # This tree: plan path → follow path → if stuck: spin → backup → retry
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"

    # Plugin libraries for the behavior tree nodes
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node


# ===========================================================================
# CONTROLLER SERVER — Local Path Following (DWB Controller)
# ===========================================================================
# The controller takes the global plan and generates velocity commands
# to follow it while avoiding dynamic obstacles.
#
# We use the DWB (Dynamic Window Based) controller, which:
# 1. Simulates many possible velocity combinations (linear × angular)
# 2. Projects each trajectory forward in time
# 3. Scores each trajectory based on multiple criteria
# 4. Sends the best velocity to /cmd_vel
#
# For our small robot, we limit speeds and use tight goal tolerances.
controller_server:
  ros__parameters:
    use_sim_time: true

    # How often the controller runs (Hz)
    # 10 Hz is fine for our slow robot (max 0.15 m/s)
    controller_frequency: 10.0

    # Minimum speed to consider (below this, robot stops)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5   # Not used (differential drive can't strafe)
    min_theta_velocity_threshold: 0.001

    # Progress checker: detect if robot is stuck
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05  # Must move 5cm in...
      movement_time_allowance: 10.0   # ...10 seconds, or it's stuck

    # Goal checker: when is the robot "at" the goal?
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10     # Within 10cm of goal position
      yaw_goal_tolerance: 0.25    # Within ~14° of goal heading
      stateful: true              # Once in tolerance, stay "at goal"

    # Controller plugin: DWB (Dynamic Window Based)
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # Velocity limits — must match our small robot's capabilities
      # These match the teleop_helper.py default speeds
      min_vel_x: 0.0               # Can stop (no minimum forward speed)
      max_vel_x: 0.15              # 0.15 m/s max forward
      min_vel_y: 0.0               # No lateral motion (differential drive)
      max_vel_y: 0.0
      max_vel_theta: 0.5           # 0.5 rad/s max turning
      min_speed_xy: 0.0
      max_speed_xy: 0.15
      min_speed_theta: 0.0

      # Acceleration limits
      acc_lim_x: 0.5               # 0.5 m/s² forward acceleration
      acc_lim_y: 0.0
      acc_lim_theta: 1.0           # 1.0 rad/s² angular acceleration
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -1.0

      # Trajectory simulation parameters
      vx_samples: 10               # Number of linear velocity samples
      vy_samples: 1                # 1 (can't strafe)
      vtheta_samples: 20           # Number of angular velocity samples
      sim_time: 1.5                # Simulate 1.5 seconds ahead
      linear_granularity: 0.02     # 2cm resolution in trajectory
      angular_granularity: 0.025   # ~1.4° resolution in trajectory
      transform_tolerance: 0.5

      # Short circuit: stop evaluating if a perfect path is found
      short_circuit_trajectory_evaluation: true

      # Trajectory critics (scoring functions)
      # Each critic assigns a score; the trajectory with the lowest total wins
      critics:
        - RotateToGoal        # Prefer rotating to face the goal at the end
        - Oscillation         # Penalize oscillating back and forth
        - BaseObstacle        # Penalize trajectories near obstacles
        - GoalAlign           # Prefer trajectories aligned with goal heading
        - PathAlign           # Prefer trajectories aligned with global path
        - PathDist            # Prefer trajectories close to the global path
        - GoalDist            # Prefer trajectories that approach the goal

      # Critic weights (tune these to change behavior)
      BaseObstacle.scale: 0.02     # Obstacle avoidance importance
      PathAlign.scale: 32.0        # Stay on the planned path
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0        # Align with goal direction
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0         # Minimize distance from path
      GoalDist.scale: 24.0         # Minimize distance to goal
      RotateToGoal.scale: 32.0     # Face the goal when close
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


# ===========================================================================
# PLANNER SERVER — Global Path Planning (NavFn / A*)
# ===========================================================================
# The planner computes a global path from the robot's current position
# to the goal using the global costmap.
#
# NavFn uses Dijkstra's algorithm (or A*) on the costmap grid.
# It finds the shortest obstacle-free path.
planner_server:
  ros__parameters:
    use_sim_time: true

    # How many planning attempts before giving up
    expected_planner_frequency: 5.0

    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.10               # Goal tolerance (10cm)
      use_astar: true                # Use A* (faster than Dijkstra for single goals)
      allow_unknown: true            # Allow planning through unknown space
                                     # (important for exploration!)


# ===========================================================================
# BEHAVIOR SERVER — Recovery Behaviors
# ===========================================================================
# When the robot gets stuck, these behaviors are triggered:
# 1. Spin in place (clear local costmap artifacts)
# 2. Back up (move away from obstacle)
# 3. Wait (let dynamic obstacles pass)
#
# The BT navigator calls these when the controller fails.
behavior_server:
  ros__parameters:
    use_sim_time: true

    # Costmap topic for collision checking during behaviors
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

    # Robot frame and transform settings
    robot_base_frame: base_footprint
    odom_frame: odom
    transform_tolerance: 0.5

    # Velocity limits during recovery (slower than normal)
    max_rotational_vel: 0.4
    min_rotational_vel: 0.1
    rotational_acc_lim: 0.8


# ===========================================================================
# LOCAL COSTMAP — Rolling Window Around Robot
# ===========================================================================
# The local costmap is a small map centered on the robot that moves
# with it. It's used by the controller for real-time obstacle avoidance.
#
# Size: 2.0m × 2.0m window (plenty for our 0.18m robot in a 5m room)
# Resolution: 0.025m (2.5cm per cell — fine detail for small robot)
# Update rate: 5 Hz (fast enough for our slow robot)
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 5.0         # How often to update (Hz)
      publish_frequency: 2.0        # How often to publish for visualization
      global_frame: odom            # Local costmap lives in odom frame
      robot_base_frame: base_footprint

      # Rolling window configuration
      rolling_window: true
      width: 2                      # 2m wide
      height: 2                     # 2m tall
      resolution: 0.025             # 2.5cm per cell

      # Robot footprint (polygon matching our chassis)
      # Our robot is 0.18m × 0.14m, add 1cm padding → 0.20 × 0.16
      # Polygon vertices: [x, y] relative to base_footprint
      footprint: "[ [0.10, 0.08], [0.10, -0.08], [-0.10, -0.08], [-0.10, 0.08] ]"

      # Plugins for populating the costmap
      plugins: ["obstacle_layer", "inflation_layer"]

      # Obstacle layer: fills costmap cells from /scan data
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true              # Clear cells when sensor sees through them
          marking: true               # Mark cells when sensor detects obstacle
          data_type: "LaserScan"
          raytrace_max_range: 8.0     # Match LiDAR max range
          raytrace_min_range: 0.1
          obstacle_max_range: 7.5
          obstacle_min_range: 0.1

      # Inflation layer: creates soft "keep away" zones around obstacles
      # This prevents the robot from scraping along walls
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0      # How steeply cost drops off from obstacle
        inflation_radius: 0.15        # Inflate 15cm from obstacles
                                      # (robot is 10cm from center to edge + 5cm buffer)

      always_send_full_costmap: true
      static_layer:
        map_subscribe_transient_local: true


# ===========================================================================
# GLOBAL COSTMAP — Full Map for Path Planning
# ===========================================================================
# The global costmap covers the entire known map area.
# It's used by the planner to find paths from robot to goal.
#
# It combines:
# 1. Static layer: the SLAM map (walls, known obstacles)
# 2. Obstacle layer: current sensor readings (dynamic obstacles)
# 3. Inflation layer: buffer zones around obstacles
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 2.0         # Lower rate (path planning is less urgent)
      publish_frequency: 1.0
      global_frame: map             # Global costmap lives in map frame
      robot_base_frame: base_footprint

      # Robot footprint (same as local costmap)
      footprint: "[ [0.10, 0.08], [0.10, -0.08], [-0.10, -0.08], [-0.10, 0.08] ]"

      # Resolution matches SLAM map (0.05m) — important for consistency
      resolution: 0.05

      # Track unknown space (important for exploration — unknown ≠ free)
      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Static layer: reads the SLAM map from /map topic
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      # Obstacle layer: real-time sensor overlay on top of static map
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.1
          obstacle_max_range: 7.5
          obstacle_min_range: 0.1

      # Inflation layer
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.15

      always_send_full_costmap: true


# ===========================================================================
# VELOCITY SMOOTHER — Smooth Velocity Commands
# ===========================================================================
# The velocity smoother sits between the controller and the motors.
# It prevents sudden velocity jumps that could:
# - Cause wheel slip (bad for odometry)
# - Stress the L293D motor driver
# - Make the robot jerk around
#
# Input: /cmd_vel (from controller_server)
# Output: /cmd_vel_smoothed (to Gazebo diff_drive or ESP32)
#
# NOTE: For this to work, the diff_drive plugin must subscribe to
# /cmd_vel_smoothed. If you don't want smoothing, disable this
# and the controller sends directly to /cmd_vel.
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0       # Output rate (Hz)
    scale_velocities: false
    feedback: "OPEN_LOOP"           # or "CLOSED_LOOP" with encoder feedback

    # Velocity limits (same as controller)
    max_velocity: [0.15, 0.0, 0.5]       # [linear_x, linear_y, angular_z]
    min_velocity: [-0.15, 0.0, -0.5]

    # Acceleration limits
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [-0.5, 0.0, -1.0]

    # Deadband: minimum command to send (prevents motor buzzing)
    deadband_velocity: [0.01, 0.0, 0.05]

    # Odom topic for closed-loop feedback
    odom_topic: "odom"
    odom_duration: 0.1


# ===========================================================================
# WAYPOINT FOLLOWER — Sequential Goal Following
# ===========================================================================
# Follows a list of waypoints one after another.
# Useful for systematic room exploration patterns.
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false        # Continue to next waypoint even if one fails
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # Pause 200ms at each waypoint


# ===========================================================================
# LIFECYCLE MANAGER — Node Lifecycle Management
# ===========================================================================
# Nav2 uses managed (lifecycle) nodes. The lifecycle manager:
# 1. Configures all nodes (loads parameters)
# 2. Activates all nodes (starts processing)
# 3. Monitors health and restarts if needed
#
# Without this, Nav2 nodes start in "unconfigured" state and do nothing!
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true                 # Automatically start all managed nodes
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
