; =============================================================================
; platformio.ini — PlatformIO Configuration for ESP32 micro-ROS Robot
; =============================================================================
;
; This file configures the PlatformIO build for the ESP32 firmware that
; runs on the REAL differential drive robot.
;
; WHAT THIS FIRMWARE DOES:
;   1. Connects to a micro-ROS agent over WiFi (or Serial)
;   2. Subscribes to /cmd_vel (geometry_msgs/Twist) for motor control
;   3. Publishes /odom (nav_msgs/Odometry) from wheel encoders
;   4. Publishes /imu (sensor_msgs/Imu) from MPU6050
;   5. Publishes /scan (sensor_msgs/LaserScan) from ultrasonic sweep
;   6. Controls motors via L293D motor driver
;   7. Reads IR obstacle sensors for safety stops
;
; HARDWARE:
;   - ESP32 DevKit V1 (or similar ESP32 board)
;   - L293D motor driver (connected to GPIO pins)
;   - 2× DC motors with encoders (optional)
;   - MPU6050 IMU (I2C: SDA=21, SCL=22)
;   - HC-SR04 ultrasonic sensor + SG90 servo
;   - IR obstacle avoidance sensors
;   - SD card module (SPI) for data logging
;
; MICRO-ROS SETUP:
;   micro-ROS allows the ESP32 to be a full ROS2 node.
;   It connects to a micro-ROS agent running on the PC:
;   
;   $ ros2 run micro_ros_agent micro_ros_agent udp4 --port 8888
;   
;   The ESP32 communicates over WiFi UDP to the agent,
;   which bridges messages to the ROS2 network.
;
; BUILD & UPLOAD:
;   $ cd esp32_firmware
;   $ pio run                    # Build
;   $ pio run --target upload    # Upload to ESP32
;   $ pio device monitor         # Serial monitor
;
; IMPORTANT:
;   - First build takes ~10 minutes (downloads micro-ROS library)
;   - Set your WiFi credentials in include/config.h
;   - Set the micro-ROS agent IP in include/config.h
; =============================================================================

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

; ---- micro-ROS for PlatformIO ----
; This library provides the complete micro-ROS stack for ESP32
; It includes rcl, rclc, micro-ROS utilities, and transport layers
lib_deps = 
    https://github.com/micro-ROS/micro_ros_platformio

; ---- Build flags ----
; -DBOARD_HAS_PSRAM: Enable PSRAM if your board has it (optional)
; -DARDUINO_USB_CDC_ON_BOOT: For USB CDC serial (ESP32-S3 only)
build_flags = 
    -D BOARD_HAS_PSRAM=0
    -D CONFIG_MICRO_ROS_APP_STACK=16000
    -D CONFIG_MICRO_ROS_APP_TASK_PRIO=5

; ---- micro-ROS transport configuration ----
; Using WiFi UDP transport to communicate with the agent
; For serial transport, change to: microros_serial_transport
board_microros_transport = wifi

; ---- Serial monitor settings ----
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ---- Upload settings ----
upload_speed = 921600

; ---- Extra library dependencies ----
; Wire: I2C communication (for MPU6050)
; SPI: SD card communication
; ESP32Servo: Servo control for ultrasonic sweep
lib_extra_dirs =
lib_ldf_mode = deep+
